# CI for Product Catalog Service
name: product-catalog-service-ci

permissions:
  contents: write

on:
  push:
    paths:
      - '.github/workflows/product-catalog-ci.yaml'
      - 'src/product-catalog/**'
  pull_request:
    branches:
      - main

jobs:
  unit-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Go
        uses: actions/setup-go@v2
        with:
          go-version: 1.22

      - name: Build
        run: |
          cd src/product-catalog
          go mod download
          go build -o product-catalog-service main.go

      - name: unit tests
        run: |
          cd src/product-catalog/
          go test -v ./...

  code-quality:
      runs-on: ubuntu-latest
      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v2
        with:
          go-version: 1.22

      - name: Run golangci-lint
        run: |
          go get github.com/golangci/golangci-lint/cmd/golangci-lint@v1.41.1
          golangci-lint run src/product-catalog/...
  build-and-push:
    runs-on: ubuntu-latest
    needs: [unit-testing, code-quality]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Docker
      uses: docker/setup-buildx-action@v1

    - name: Login to Docker
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name : Build push 
      uses: docker/build-push-action@v6
      with:
        context: ./src/product-catalog
        file: ./src/product-catalog/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.sha }}
       
  update-k8s-deployment:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Update tag in kubernetes deployment manifest
      run: |
        sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.sha }}|" kubernetes/productcatalog/deploy.yaml
        cat kubernetes/productcatalog/deploy.yaml
    - name: Commit and push changes
      run: |
        git config --global user.email "adamumj@gmail.com"
        git config --global user.name "adamumj"
        git add kubernetes/productcatalog/deploy.yaml
        git commit -m "[CI]: Update product-catalog deployment image tag"
        git push