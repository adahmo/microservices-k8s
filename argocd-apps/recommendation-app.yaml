apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: recommendation
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/adahmo/microservices-k8s.git
    targetRevision: HEAD
    path: kubernetes/recommendation
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
